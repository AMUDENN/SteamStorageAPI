app:
  tokenAddress: "https://steamstorage.ru/token/"
  dateFormat: "dd.MM.yyyy"
  publicHost: "localhost:8081"

jwt:
  key: "your-secret-key-here"
  issuer: "SteamStorageAPI"
  audience: "SteamStorageClient"
  expiresDays: 1

steam:
  apiKey: "your-steam-api-key-here"

database:
  steamStorage: "Server=...;Database=SteamStorage;..."

healthChecks:
  apiUrl: "http://steamstorage.api"
  adminPanelUrl: "http://adminpanel"
  loginWebAppUrl: "http://loginwebapp"

rateLimit:
  enableEndpointRateLimiting: true
  stackBlockedRequests: false
  httpStatusCode: 429
  realIpHeader: "X-Forwarded-For"
  clientIdHeader: "X-ClientId"
  rules:
    - endpoint: "get:/api/health-*"
      period: "1s"
      limit: 1000
    - endpoint: "*"
      period: "1s"
      limit: 20

backgroundServices:
  refreshSkinDynamicsJob:
    cronSchedule: "0 0 0 * * ?"          # 00:00 every day
    errorDelayMs: 1800000                 # 30 min
  refreshCurrencies:
    cronSchedule: "0 0 1 * * ?"          # 01:00 every day
    errorDelayMs: 1800000                 # 30 min
  refreshActiveGroupsDynamicsJob:
    cronSchedule: "0 0 3 * * ?"          # 03:00 every day
    errorDelayMs: 1800000                 # 30 min