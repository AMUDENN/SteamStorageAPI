services:
  steamstorage.api:
    image: steamstorage.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Release
      - ASPNETCORE_URLS=http://+:80
      - CONFIG_PATH=.config.yaml
    ports:
      - "8081:80"
    volumes:
      - ./SteamStorageAPI/.config.yaml:/app/.config.yaml:ro
    build:
      context: .
      dockerfile: SteamStorageAPI/Dockerfile
  
  loginwebapp:
    image: loginwebapp
    environment:
      - ASPNETCORE_ENVIRONMENT=Release
      - ASPNETCORE_URLS=http://+:80
      - CONFIG_PATH=.config.yaml
    ports:
      - "8083:80"
    volumes:
      - ./LoginWebApp/.config.yaml:/app/.config.yaml:ro
    build:
      context: .
      dockerfile: LoginWebApp/Dockerfile
  
  adminpanel:
    image: adminpanel
    environment:
      - ASPNETCORE_ENVIRONMENT=Release
      - ASPNETCORE_URLS=http://+:80
      - STEAMSTORAGE_API_INTERNAL_HOST=steamstorage.api
      - STEAMSTORAGE_API_PUBLIC_HOST=localhost:8081
    ports:
      - "8085:80"
    build:
      context: .
      dockerfile: AdminPanel/Dockerfile

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - steamstorage.api

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data: