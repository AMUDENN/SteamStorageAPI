services:
  steamstorage.api:
    image: ghcr.io/amudenn/steamstorage-api:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Release
      - ASPNETCORE_URLS=http://+:80
      - CONFIG_PATH=.config.yaml
    ports:
      - "8081:80"
    volumes:
      - ./SteamStorageAPI/.config.yaml:/app/.config.yaml:ro
    networks:
      - steamstorage-network

  loginwebapp:
    image: ghcr.io/amudenn/loginwebapp:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Release
      - ASPNETCORE_URLS=http://+:80
      - CONFIG_PATH=.config.yaml
    ports:
      - "8083:80"
    volumes:
      - ./LoginWebApp/.config.yaml:/app/.config.yaml:ro
    networks:
      - steamstorage-network

  adminpanel:
    image: ghcr.io/amudenn/adminpanel:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Release
      - ASPNETCORE_URLS=http://+:80
      - CONFIG_PATH=.config.yaml
    ports:
      - "8085:80"
    volumes:
      - ./AdminPanel/.config.yaml:/app/.config.yaml:ro
    networks:
      - steamstorage-network

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - steamstorage.api
    networks:
      - steamstorage-network

  grafana:
    image: grafana/grafana:latest
    env_file:
      - grafana.env
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - steamstorage-network

networks:
  steamstorage-network:
    driver: bridge
    ipam:
      config:
        - subnet: "172.20.0.0/24"

volumes:
  prometheus_data:
  grafana_data: